<html>
	<head>
		<link rel="stylesheet" href="style.css">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	</head>
	<body>
		<form class="row g-3 needs-validation" novalidate>
			<div class="col-md-4">
				<label for="first-name-input" class="form-label">First Name</label>
				<input type="text" id="first-name-input" class="form-control" required>
				<div class="invalid-feedback">
					First name required
				</div>
			</div>

			<div class="col-md-4">
				<label for="last-name-input" class="form-label">Last Name</label>
				<input type="text" id="last-name-input" class="form-control" required>
				<div class="invalid-feedback">
					Last name required
				</div>
			</div>

			<div class="col-md-4">
				<label for="email-input" class="form-label">Email Address</label>
				<input type="email" id="email-input" class="form-control" required>
				<div class="invalid-feedback">
					Email required
				</div>
			</div>

			<div class="col-md-4">
				<label for="college-input" class="form-label">College</label>
				<input type="text" id="college-input" class="form-control" required>
				<div class="invalid-feedback">
					College name required
				</div>
			</div>

			<div class="col-md-4">
			    <label for="grad-year-select" class="form-label">Graduation Year</label>
			    <select class="form-select" id="grad-year-select" required>
				      <option selected disabled value="">Choose...</option>
				      <option value="2020">2020</option>
					  <option value="2021">2021</option>
					  <option value="2022">2022</option>
					  <option value="2023">2023</option>
			    </select>
			    <div class="invalid-feedback">
				      Please select a valid year
			    </div>
			  </div>

			<div class="col-md-4">
				<label for="roll-no-input" class="form-label">Roll No.</label>
				<input type="text" id="roll-no-input" class="form-control" min="1" required>
				<div class="invalid-feedback">
					Roll No required
				</div>
			</div>

			<div class="col-12">
			    <div class="form-check">
			      <input class="form-check-input" type="checkbox" value="" id="conditions-checkbox" required>
			      <label class="form-check-label" for="conditions-checkbox">
			        Agree to terms and conditions
			      </label>
				    <div class="invalid-feedback">
				        You must agree before submitting.
				      </div>
			      </div>
			</div>

		<div class="col-12">
		    <button class="btn btn-primary" type="submit">Submit form</button>
		</div>
		</form>
		
		<script></script>
	</body>
</html>
